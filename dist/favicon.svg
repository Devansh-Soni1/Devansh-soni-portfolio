<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#00eeff"/>
    </linearGradient>
    <filter id="f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect width="32" height="32" rx="6" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.6"/>

  <!-- Corner accents -->
  <path d="M2 8 L2 2 L8 2" fill="none" stroke="#00eeff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M24 2 L30 2 L30 8" fill="none" stroke="#00eeff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M2 24 L2 30 L8 30" fill="none" stroke="#00eeff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M24 30 L30 30 L30 24" fill="none" stroke="#00eeff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- DS text with glow -->
  <text
    x="16" y="21"
    text-anchor="middle"
    font-family="Arial Black, sans-serif"
    font-size="13"
    font-weight="900"
    fill="url(#glow)"
    filter="url(#f)"
    letter-spacing="-0.5"
  >DS</text>

  <!-- Bottom line accent -->
  <line x1="8" y1="29" x2="24" y2="29" stroke="url(#glow)" stroke-width="1" opacity="0.5"/>
</svg>
